services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: booking
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
    ports:
      - '5432:5432'
    volumes:
      - booking-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U booking -d booking']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  booking-postgres-data:
