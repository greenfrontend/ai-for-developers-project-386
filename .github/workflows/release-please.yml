name: release-please

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update release pull request
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          target-branch: master
