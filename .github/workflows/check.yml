name: check

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: booking
          POSTGRES_USER: booking
          POSTGRES_PASSWORD: booking
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booking -d booking"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://booking:booking@localhost:5432/booking
      VITE_API_BASE_URL: http://127.0.0.1:4010
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Compile contracts and type-check apps
        run: make check

      - name: Run backend tests
        run: npm run backend:test

      - name: Migrate database
        run: npm run backend:db:migrate

      - name: Run Playwright e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7
