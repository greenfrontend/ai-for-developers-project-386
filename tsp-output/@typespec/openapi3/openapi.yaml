openapi: 3.0.0
info:
  title: Event Types API
  version: 0.0.0
tags: []
paths:
  /event-types:
    get:
      operationId: EventTypes_list
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
components:
  schemas:
    EventType:
      type: object
      required:
        - id
        - title
        - durationMinutes
      properties:
        id:
          type: string
        title:
          type: string
        durationMinutes:
          type: integer
          format: int32
